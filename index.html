<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nev Commerce OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Nunito+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f1f8;--solid:#ffffff;
  --border:rgba(100,80,190,0.09);--border-m:rgba(100,80,190,0.15);--border-s:rgba(100,80,190,0.24);
  --p50:#f5f3ff;--p100:#ede9fe;--p200:#ddd6fe;--p300:#c4b5fd;
  --p400:#a78bfa;--p500:#8b5cf6;--p600:#7c3aed;--p700:#6d28d9;--p800:#5b21b6;
  --ink:#130e25;--ink2:#3a3260;--ink3:#8880a6;--ink4:#bcb8d0;
  --green:#059669;--gbg:#d1fae5;--red:#dc2626;--rbg:#fee2e2;
  --amber:#d97706;--abg:#fef3c7;--blue:#2563eb;--bbg:#dbeafe;
  --r1:24px;--r2:16px;--r3:12px;--r4:8px;
  --sh:0 2px 14px rgba(100,80,190,0.08),0 0 1px rgba(100,80,190,0.07);
  --shm:0 8px 32px rgba(100,80,190,0.12),0 2px 6px rgba(100,80,190,0.06);
  --sbl:256px;--tbh:62px;
  --body:'Nunito Sans',sans-serif;--disp:'Nunito',sans-serif;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p200);border-radius:99px}
.shell{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sbl{width:var(--sbl);height:100vh;flex-shrink:0;background:var(--solid);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;animation:sideIn .5s var(--ease) both}
@keyframes sideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
.sbl-logo{display:flex;align-items:center;gap:12px;padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sbl-mark{width:38px;height:38px;border-radius:13px;flex-shrink:0;background:linear-gradient(145deg,var(--p700),var(--p400));display:grid;place-items:center;box-shadow:0 4px 14px rgba(109,40,217,.30)}
.sbl-name{font-family:var(--disp);font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.3px;line-height:1.1}
.sbl-sub{font-size:10.5px;font-weight:600;color:var(--ink3);letter-spacing:.3px}
.sbl-body{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sbl-sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.1px;color:var(--ink4);padding:14px 10px 5px;pointer-events:none}
.sbl-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r3);font-size:13.5px;font-weight:600;color:var(--ink3);cursor:pointer;user-select:none;transition:background .14s,color .14s;position:relative}
.sbl-item:hover{background:var(--p50);color:var(--p700)}
.sbl-item.on{background:var(--p50);color:var(--p700);box-shadow:inset 2px 0 0 var(--p600)}
.sbl-ico{width:17px;height:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sbl-badge{margin-left:auto;font-family:var(--disp);font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px;min-width:20px;text-align:center;line-height:1.5}
.sbl-badge.pu{background:var(--p100);color:var(--p700)}
.sbl-badge.gr{background:var(--gbg);color:var(--green)}
.sbl-foot{padding:12px 10px 14px;border-top:1px solid var(--border)}
.sbl-user{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--r3);cursor:pointer;transition:background .14s}
.sbl-user:hover{background:var(--p50)}
.sbl-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--p600),var(--p400));display:grid;place-items:center;font-family:var(--disp);font-size:13px;font-weight:800;color:#fff;letter-spacing:-.2px}
.sbl-uname{font-size:13px;font-weight:700;color:var(--ink)}
.sbl-urole{font-size:11px;font-weight:500;color:var(--ink3)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tbar{height:var(--tbh);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--solid);border-bottom:1px solid var(--border);position:relative;z-index:40}
.tbar-l{display:flex;flex-direction:column;gap:1px}
.tbar-title{font-family:var(--disp);font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.tbar-sub{font-size:11.5px;font-weight:500;color:var(--ink3)}
.tbar-r{display:flex;align-items:center;gap:9px}
.tbar-chip{display:flex;align-items:center;gap:7px;padding:0 14px;height:36px;border-radius:var(--r2);background:var(--p50);border:1px solid var(--p200);font-family:var(--body);font-size:12px;font-weight:700;color:var(--p700);white-space:nowrap}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tbar-search{display:flex;align-items:center;gap:7px;padding:0 13px;height:36px;width:190px;background:var(--bg);border:1px solid var(--border-m);border-radius:var(--r2);font-size:13px;color:var(--ink3);cursor:text;transition:border-color .18s;font-family:var(--body);font-weight:500}
.tbar-search:hover{border-color:var(--p400)}
.tbar-btn{width:36px;height:36px;border-radius:var(--r3);background:var(--bg);border:1px solid var(--border-m);display:grid;place-items:center;cursor:pointer;transition:all .15s;position:relative}
.tbar-btn:hover{background:var(--p50);border-color:var(--p400)}
.tbar-ndot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--p600);border:1.5px solid white}

/* Page */
.page{flex:1;overflow-y:auto;padding:24px 28px 40px;display:flex;flex-direction:column}
.tabstrip{display:flex;gap:2px;background:var(--solid);border:1px solid var(--border-m);border-radius:var(--r2);padding:4px;width:fit-content;margin-bottom:22px;animation:fadeUp .35s var(--ease) both}
.tab{padding:7px 19px;border-radius:var(--r3);font-family:var(--body);font-size:13px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .16s;white-space:nowrap}
.tab:hover:not(.on){color:var(--ink2);background:var(--p50)}
.tab.on{background:var(--p600);color:#fff;box-shadow:0 2px 10px rgba(109,40,217,.28)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kcard{background:var(--solid);border:1px solid var(--border);border-radius:var(--r1);padding:20px;transition:transform .25s var(--ease),box-shadow .25s,border-color .25s;animation:fadeUp .45s var(--ease) both;cursor:default}
.kcard:hover{transform:translateY(-3px);box-shadow:var(--shm);border-color:var(--border-m)}
.ktop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.klabel{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3)}
.kico{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex-shrink:0}
.kval{font-family:var(--disp);font-size:30px;font-weight:800;color:var(--ink);letter-spacing:-1px;line-height:1;margin-bottom:9px}
.kfoot{display:flex;align-items:center;gap:7px}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:11.5px;font-weight:700;font-family:var(--body)}
.pill.up{background:var(--gbg);color:var(--green)}
.pill.dn{background:var(--rbg);color:var(--red)}
.kcmp{font-size:11.5px;font-weight:500;color:var(--ink3)}
.spark{margin-top:12px;height:36px;overflow:hidden}

/* Card */
.card{background:var(--solid);border:1px solid var(--border);border-radius:var(--r1);padding:22px;animation:fadeUp .45s var(--ease) both}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.ct{font-family:var(--disp);font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.2px}
.cs{font-size:12px;font-weight:500;color:var(--ink3);margin-top:2px}
.ca{font-size:12px;font-weight:700;color:var(--p600);padding:5px 12px;border-radius:var(--r3);border:1px solid var(--p200);background:var(--p50);cursor:pointer;transition:all .14s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.ca:hover{background:var(--p100);border-color:var(--p400)}

/* Layouts */
.g2{display:grid;grid-template-columns:1fr 360px;gap:16px;margin-bottom:16px}
.g2e{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.mb{margin-bottom:16px}

/* Period */
.period{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border-m);border-radius:var(--r3);padding:3px}
.pbtn{padding:4px 11px;border-radius:var(--r4);font-family:var(--body);font-size:11.5px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all .14s}
.pbtn.on{background:var(--solid);color:var(--p700);box-shadow:var(--sh)}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl thead th{text-align:left;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);padding-bottom:11px;border-bottom:1px solid var(--border-m)}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--p50)}
.tbl tbody td{padding:10px 0;font-size:13px;font-weight:500;color:var(--ink2);border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.oid{font-family:var(--disp);font-size:12px;font-weight:800;color:var(--ink)}
.cname{font-size:13px;font-weight:700;color:var(--ink)}
.bdg{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--body)}
.bdg .d{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.bdg.delivered{background:var(--gbg);color:var(--green)}
.bdg.shipped{background:var(--bbg);color:var(--blue)}
.bdg.processing{background:var(--abg);color:var(--amber)}
.bdg.cancelled{background:var(--rbg);color:var(--red)}

/* Bar */
.brow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.blbl{width:112px;font-size:12.5px;font-weight:600;color:var(--ink2);flex-shrink:0}
.btrk{flex:1;height:7px;background:var(--p100);border-radius:99px;overflow:hidden}
.bfil{height:100%;border-radius:99px;transition:width 1.2s var(--ease)}
.bpct{width:34px;font-size:12px;font-weight:700;color:var(--ink);text-align:right;flex-shrink:0}

/* Progress */
.prog{height:5px;background:var(--p100);border-radius:99px;overflow:hidden;margin-top:7px}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p700),var(--p400));transition:width 1.3s var(--ease)}

/* Product row */
.prow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);transition:padding-left .16s;cursor:default}
.prow:last-child{border-bottom:none}
.prow:hover{padding-left:5px}
.pthumb{width:40px;height:40px;border-radius:11px;flex-shrink:0;background:var(--p50);border:1px solid var(--border-m);display:grid;place-items:center}
.pn{font-size:13px;font-weight:700;color:var(--ink)}
.pc{font-size:11.5px;font-weight:500;color:var(--ink3)}
.pr{font-family:var(--disp);font-size:14px;font-weight:800;color:var(--ink);text-align:right}
.pu2{font-size:11px;font-weight:500;color:var(--ink3);text-align:right}

/* Donut */
.dwrap{position:relative;width:148px;height:148px;margin:0 auto 18px}
.dctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dv{font-family:var(--disp);font-size:24px;font-weight:800;color:var(--ink)}
.dl{font-size:10.5px;font-weight:600;color:var(--ink3)}
.lrow{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.lsw{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.ln{flex:1;font-size:12.5px;font-weight:600;color:var(--ink2)}
.lv{font-size:12.5px;font-weight:800;color:var(--ink)}

/* Map */
.mshell{position:relative;border-radius:var(--r2);overflow:hidden;height:320px;background:var(--p50);border:1px solid var(--border-m)}
.mtip{position:fixed;background:var(--ink);color:#fff;font-family:var(--body);font-size:12px;font-weight:600;padding:7px 13px;border-radius:var(--r3);pointer-events:none;z-index:999;box-shadow:var(--shm);display:none}

/* Feed */
.fitem{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);animation:feedIn .32s var(--ease) both}
@keyframes feedIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.fitem:last-child{border-bottom:none}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ftxt{font-size:12.5px;font-weight:500;color:var(--ink2);line-height:1.5}
.fts{font-size:11px;font-weight:500;color:var(--ink3);margin-top:2px}

/* Stat tile */
.stile{background:var(--p50);border:1px solid var(--border-m);border-radius:var(--r2);padding:16px 18px}
.sv{font-family:var(--disp);font-size:26px;font-weight:800;color:var(--ink);margin-bottom:3px}
.sl{font-size:11.5px;font-weight:600;color:var(--ink3)}

/* Segment */
.segcard{background:var(--p50);border:1px solid var(--border-m);border-radius:var(--r2);padding:15px 17px}
.segname{font-size:12px;font-weight:800;margin-bottom:5px}
.segval{font-family:var(--disp);font-size:22px;font-weight:800;color:var(--ink);margin-bottom:3px}
.segdesc{font-size:11.5px;font-weight:500;color:var(--ink3);line-height:1.5;margin-bottom:9px}

/* Inventory */
.icard{background:var(--solid);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.in2{font-size:13px;font-weight:700;color:var(--ink)}
.ic2{font-size:11px;font-weight:500;color:var(--ink3)}
.istk{font-family:var(--disp);font-size:22px;font-weight:800}

/* Misc */
.srow{display:grid;gap:14px;padding-top:16px;border-top:1px solid var(--border)}
.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setrow:last-of-type{border-bottom:none}
.setlbl{font-size:13.5px;font-weight:700;color:var(--ink)}
.setval{font-size:13px;font-weight:500;color:var(--ink2);background:var(--bg);border:1px solid var(--border-m);border-radius:var(--r3);padding:6px 14px}
.savebtn{padding:10px 26px;background:var(--p600);color:#fff;border:none;border-radius:var(--r3);font-family:var(--body);font-size:13.5px;font-weight:700;cursor:pointer;margin-top:18px;transition:background .14s,transform .14s}
.savebtn:hover{background:var(--p700);transform:translateY(-1px)}
.rtbig{font-family:var(--disp);font-size:52px;font-weight:800;color:var(--p600);line-height:1}
.empty{text-align:center;padding:54px 0;color:var(--ink3);font-weight:600;font-size:13.5px}

/*
  FIX: chart-wrap constrains the SVG container.
  SVGs must NOT have width/height HTML attributes — only viewBox + CSS.
  preserveAspectRatio="xMidYMid meet" on the SVG ensures proportional scaling.
*/
.chart-wrap{width:100%;overflow:hidden}
.chart-wrap svg{width:100%;height:auto;display:block}
</style>
</head>
<body>
<div id="map-tip" class="mtip"></div>
<div class="shell">
  <!-- Sidebar -->
  <aside class="sbl">
    <div class="sbl-logo">
      <div class="sbl-mark">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L3 5.5v4C3 13.5 6 17 10 18c4-1 7-4.5 7-8.5v-4L10 2z" fill="white" opacity=".95"/>
          <path d="M7 10l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="sbl-name">Nev</div>
        <div class="sbl-sub">Commerce OS</div>
      </div>
    </div>
    <div class="sbl-body" id="nav-body"></div>
    <div class="sbl-foot">
      <div class="sbl-user">
        <div class="sbl-av">NK</div>
        <div style="flex:1">
          <div class="sbl-uname">Nevin</div>
          <div class="sbl-urole">Store Admin</div>
        </div>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8880a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
      </div>
    </div>
  </aside>
  <!-- Main -->
  <div class="main">
    <header class="tbar">
      <div class="tbar-l">
        <div class="tbar-title" id="tbar-title">Dashboard</div>
        <div class="tbar-sub" id="tbar-sub">Good morning, Nevin. Here's your store at a glance.</div>
      </div>
      <div class="tbar-r">
        <div class="tbar-chip"><div class="live-dot"></div> Live · Mar 31, 2026</div>
        <div class="tbar-search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8880a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg><span>Search...</span></div>
        <div class="tbar-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3a3260" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg><div class="tbar-ndot"></div></div>
        <div class="tbar-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3a3260" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div>
      </div>
    </header>
    <div class="page" id="page-content">
      <div id="tabstrip" class="tabstrip"></div>
      <div id="page-view"></div>
    </div>
  </div>
</div>

<script>
// ── Icons ──────────────────────────────────────────────────────────────────────
const ICONS = {
  dashboard:"M3 3h7a1 1 0 011 1v7a1 1 0 01-1 1H3a1 1 0 01-1-1V4a1 1 0 011-1zm11 0h7a1 1 0 011 1v7a1 1 0 01-1 1h-7a1 1 0 01-1-1V4a1 1 0 011-1zM3 14h7a1 1 0 011 1v7a1 1 0 01-1 1H3a1 1 0 01-1-1v-7a1 1 0 011-1zm11 0h7a1 1 0 011 1v7a1 1 0 01-1 1h-7a1 1 0 01-1-1v-7a1 1 0 011-1z",
  analytics:"M22 12h-4l-3 9L9 3l-3 9H2",
  clock:"M12 2a10 10 0 100 20A10 10 0 0012 2zm0 6v6l4 2",
  orders:"M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0",
  products:"M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z",
  customers:"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 100 8 4 4 0 000-8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75",
  inventory:"M21 8v13H3V8M1 3h22v5H1zM10 12h4",

function sparkSVG(data, color="#7c3aed"){
  const W=120,H=36,max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>[(i/(data.length-1))*W, H-4-((v-min)/(max-min||1))*(H-8)]);
  let p=`M${pts[0][0]},${pts[0][1]}`;
  pts.slice(1).forEach(pt=>p+=` L${pt[0]},${pt[1]}`);
  const a=p+` L${W},${H} L0,${H}Z`;
  const gid="g"+color.replace(/[^a-z0-9]/gi,"");
  // FIX: removed width/height attributes — viewBox + CSS control sizing only.
  // preserveAspectRatio="none" preserves the stretchy sparkline look intentionally.
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:36px;display:block" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".14"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${a}" fill="url(#${gid})"/>
    <path d="${p}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// FIX: removed width="${W}" height="${H}" HTML attributes from the SVG tag.
// Browsers use those attributes as intrinsic size and can ignore CSS width/height,
// causing the SVG to render at its native 600×200 and then be scaled/distorted.
// With only viewBox set, the browser uses the CSS width:100%;height:auto from
// .chart-wrap svg, which scales proportionally at any container width.
function revChartSVG(period){
  const DS={
    "7D": [38,44,39,55,62,58,72],
    "30D":[38,42,55,48,61,58,66,70,88,74,72,84,80,77,83,91,95,88,84,80,87,93,89,86,92,97,89,85,91,95],
    "12M":[38,42,55,48,61,58,66,70,88,74,72,84],
  };
  const LB={
    "7D": ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    "30D":Array.from({length:30},(_,i)=>`D${i+1}`),
    "12M":["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"],
  };
  const data=DS[period],lbls=LB[period];
  const W=600,H=200,PL=44,PR=10,PT=12,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const max=Math.max(...data)+6,min=Math.min(...data)-6;
  const xS=i=>PL+(i/(data.length-1))*cW;
  const yS=v=>PT+cH-((v-min)/(max-min))*cH;
  const pts=data.map((v,i)=>[xS(i),yS(v)]);
  let d=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const mx=(pts[i][0]+pts[i+1][0])/2;
    d+=` C${mx},${pts[i][1]} ${mx},${pts[i+1][1]} ${pts[i+1][0]},${pts[i+1][1]}`;
  }
  const area=d+` L${pts[pts.length-1][0]},${PT+cH} L${pts[0][0]},${PT+cH}Z`;
  const step=data.length>15?Math.ceil(data.length/7):1;
  let gridLines="";
  [0,.25,.5,.75,1].forEach(f=>{
    const y=PT+cH*(1-f);
    gridLines+=`<line x1="${PL}" x2="${W-PR}" y1="${y}" y2="${y}" stroke="rgba(100,80,190,0.07)" stroke-width="1"/>
    <text x="${PL-5}" y="${y+4}" text-anchor="end" font-size="6" fill="#8880a6" font-family="Nunito Sans,sans-serif" font-weight="600">₹${Math.round(min+f*(max-min))}L</text>`;
  });
  let dots="";
  pts.forEach(([x,y],i)=>{
    if(i%step===0) dots+=`<circle cx="${x}" cy="${y}" r="3" fill="white" stroke="#7c3aed" stroke-width="1.8"/>
    <text x="${x}" y="${H-6}" text-anchor="middle" font-size="6" fill="#8880a6" font-family="Nunito Sans,sans-serif" font-weight="600">${lbls[i]}</text>`;
  });
  // KEY FIX: no width/height attributes — viewBox alone defines aspect ratio.
  // CSS on .chart-wrap svg (width:100%; height:auto) scales it correctly.
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".13"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient></defs>
    ${gridLines}
    <path d="${area}" fill="url(#rg)"/>
    <path d="${d}" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

// ── Counter animation ──────────────────────────────────────────────────────────
function animateCount(el, to, dur=1300, delay=0, fmt){
  setTimeout(()=>{
    const s=performance.now();
    function frame(now){
      const p=Math.min((now-s)/dur,1);
      const v=to*(1-Math.pow(1-p,4));
      el.textContent=fmt(v);
      if(p<1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  },delay);
}

// ── Render ──────────────────────────────────────────────────────────────────────
function renderPage(){
  clearRtInterval();
  const p=currentPage, s=currentSub;
  document.getElementById("tbar-title").textContent=META[p].title;
  document.getElementById("tbar-sub").textContent=META[p].sub;

  const tabs=TABS[p]||[];
  const ts=document.getElementById("tabstrip");
  if(tabs.length>1){
    ts.style.display="";
    ts.innerHTML=tabs.map(t=>`<div class="tab${s===t?" on":""}" data-tab="${t}">${t}</div>`).join("");
    ts.querySelectorAll(".tab").forEach(el=>el.addEventListener("click",()=>{currentSub=el.dataset.tab;renderPage();}));
  } else {
    ts.style.display="none";
  }

  let html="";
  if(p==="overview"){
    if(s==="Summary")   html=buildOvSummary();
    else if(s==="Sales Map") html=buildOvMap();
    else                html=buildOvChannels();
  } else if(p==="realtime")   html=buildRealtime(s);
  else if(p==="orders")     html=buildOrders(s);
  else if(p==="products")   html=buildProducts(s);
  else if(p==="customers")  html=buildCustomers(s);
  else if(p==="inventory")  html=buildInventory();
  else if(p==="revenue")    html=buildRevenue(s);
  else if(p==="settings")   html=buildSettings(s);

  document.getElementById("page-view").innerHTML=html;
  afterRender();
}

function afterRender(){
  const p=currentPage, s=currentSub;

  // KPI counters
  if(p==="overview"&&s==="Summary"){
    const vr=document.getElementById("kv-rev");
    const vo=document.getElementById("kv-ord");
    const vc=document.getElementById("kv-conv");
    const va=document.getElementById("kv-aov");
    if(vr) animateCount(vr,84,1300,200,v=>`₹${v.toFixed(1)}L`);
    if(vo) animateCount(vo,3847,1300,300,v=>Math.round(v).toLocaleString("en-IN"));
    if(vc) animateCount(vc,4.8,1300,400,v=>`${v.toFixed(1)}%`);
    if(va) animateCount(va,2183,1300,500,v=>`₹${Math.round(v).toLocaleString("en-IN")}`);

    // Revenue period toggle
    const rpt=document.getElementById("rev-period-toggle");
    if(rpt){
      rpt.addEventListener("click",e=>{
        const btn=e.target.closest(".pbtn");
        if(!btn) return;
        rpt.querySelectorAll(".pbtn").forEach(b=>b.classList.remove("on"));
        btn.classList.add("on");
        const wrap=document.getElementById("rev-chart-wrap");
        if(wrap) wrap.innerHTML=revChartSVG(btn.dataset.period);
      });
    }
  }

  // Realtime interval
  if(p==="realtime"){
    startRtInterval();
  }

  // Map pin tooltips
  const tip=document.getElementById("map-tip");
  document.querySelectorAll("[data-label][data-orders]").forEach(pin=>{
    pin.addEventListener("mouseenter",e=>{
      tip.style.display="block";
      tip.innerHTML=`<div>${pin.dataset.label}</div><div style="font-weight:500;opacity:.7;font-size:11px;margin-top:2px">${pin.dataset.orders} orders · ${pin.dataset.rev}</div>`;
      tip.style.left=(e.clientX+14)+"px";
      tip.style.top=(e.clientY-42)+"px";
    });
    pin.addEventListener("mousemove",e=>{
      tip.style.left=(e.clientX+14)+"px";
      tip.style.top=(e.clientY-42)+"px";
    });
    pin.addEventListener("mouseleave",()=>tip.style.display="none");
  });
}

function startRtInterval(){
  const names=["Rahul K.","Sneha M.","Arjun T.","Nisha P.","Rohan G.","Tanvi S."];
  const amts=["₹1,299","₹3,480","₹2,199","₹4,100","₹899","₹6,200"];
  rtInterval=setInterval(()=>{
    rtSess=Math.max(1000,rtSess+Math.floor(Math.random()*5-2));
    if(Math.random()>0.65){
      const n=Math.floor(Math.random()*names.length);
      rtFeed=[{txt:`New order from ${names[n]} — ${amts[n]}`,time:"Just now",c:"#7c3aed"},...rtFeed.slice(0,9)];
      rtOrd++;
    }
    // Update DOM if on live feed
    if(currentPage==="realtime"&&currentSub==="Live Feed"){
      const fd=document.getElementById("rt-feed");
      const se=document.getElementById("rt-sess");
      const oe=document.getElementById("rt-ord");
      if(fd) fd.innerHTML=rtFeed.map((f,i)=>`<div class="fitem" style="animation-delay:${i*.04}s"><div class="fdot" style="background:${f.c}"></div><div><div class="ftxt">${f.txt}</div><div class="fts">${f.time}</div></div></div>`).join("");
      if(se) se.textContent=rtSess.toLocaleString();
      if(oe) oe.textContent=rtOrd;
    }
    if(currentPage==="realtime"&&currentSub==="Active Map"){
      const sub=document.getElementById("rt-map-sub");
      if(sub) sub.textContent=`${rtSess} users browsing right now`;
    }
  },3000);
}
function clearRtInterval(){
  if(rtInterval){clearInterval(rtInterval);rtInterval=null;}
}

// ── Nav ─────────────────────────────────────────────────────────────────────────
function buildNav(){
  const body=document.getElementById("nav-body");
  body.innerHTML=NAV.map(sec=>`<div>
    <div class="sbl-sec">${sec.s}</div>
    ${sec.items.map(item=>`<div class="sbl-item${currentPage===item.id?" on":""}" data-id="${item.id}">
      <span class="sbl-ico">${ic(item.icon,16,"currentColor")}</span>
      ${item.label}
      ${item.badge?`<span class="sbl-badge ${item.bc||"pu"}">${item.badge}</span>`:""}
    </div>`).join("")}
  </div>`).join("");
  body.querySelectorAll(".sbl-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.id;
      if(id===currentPage) return;
      currentPage=id;
      currentSub=(TABS[id]||["Summary"])[0];
      buildNav();
      renderPage();
    });
  });
}

// ── Init ────────────────────────────────────────────────────────────────────────
buildNav();
renderPage();
</script>
</body>
